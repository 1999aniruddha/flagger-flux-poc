apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: podinfo
  namespace: default
spec:
  provider: istio

  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: podinfo

  service:
    port: 80
    targetPort: 9898
    gateways:
    - podinfo-gateway

  analysis:
    interval: 30s
    threshold: 5
    maxWeight: 50
    stepWeight: 10

    metrics:
    - name: request-success-rate
      thresholdRange:
        min: 99
      interval: 1m

    - name: request-duration
      thresholdRange:
        max: 500
      interval: 1m